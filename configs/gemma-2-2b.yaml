# Default showcase: gemma-2-2b + Gemma Scope (JumpReLU 16k SAEs).
# Runs on a single consumer GPU or on Apple Silicon via MPS.
# gemma-2-2b is gated on Hugging Face -> set HF_TOKEN in your .env first.
seed: 0

model:
  name: google/gemma-2-2b
  backend: transformerlens
  device: auto        # auto -> mps on Apple Silicon, cuda on NVIDIA
  dtype: bfloat16

sae:
  release: gemma-scope-2b-pt-res-canonical
  sae_id: layer_12/width_16k/canonical
  layer: 12
  hook_name: blocks.12.hook_resid_post

steer:
  coefs: [-40, -20, -10, -5, 0, 5, 10, 20, 40]
  max_new_tokens: 40

eval:
  judge_model: qwen2.5:7b
  judge_host: http://localhost:11434
  prompts:
    - "I think that"
    - "The weather today"
    - "Let me tell you about"
